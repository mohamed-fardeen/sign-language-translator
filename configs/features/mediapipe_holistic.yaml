mediapipe:
  model_complexity: 1
  smooth_landmarks: true
  refine_face_landmarks: false
  static_image_mode: false
  # MVP: face extraction is removed entirely from the v1 pipeline.
  # See ARCHITECTURE.md for context. Re-enabling would require
  # restoring the face branch in signlang.models.sign_model.
  extract_face: false

streams:
  pose:
    enabled: true
    n_keypoints: 33
  left_hand:
    enabled: true
    n_keypoints: 21
  right_hand:
    enabled: true
    n_keypoints: 21

preprocess:
  target_fps: 30
  frame_size: 256
  clip_frames: 64
  min_frames: 32
  max_frames: 96
  # MVP: cap on the number of source videos processed.
  # Set to null (or remove the key) to process the full dataset.
  max_videos: 3000

normalization:
  center_on_pose: true
  pose_index_shoulder_left: 11
  pose_index_shoulder_right: 12
  scale_by: shoulder_distance

missing_hand_strategy: zero_fill
