_target_: signlang.models.sign_model.SignModel
# v1 ISLR (single-label classification).
# Output classes == vocab_size. Manifest labels are 1..vocab_size; the model
# uses 0..vocab_size-1 internally and we subtract 1 at the loss call.
vocab_size: 500
clip_frames: 64
in_dim_pose: 99
in_dim_hand: 63
n_streams: 3
encoder_dim: 128
fusion_dim: 512
backbone:
  _target_: signlang.models.backbones.transformer.TransformerBackbone
  d_model: 512
  n_heads: 8
  n_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  activation: gelu
  norm_first: true
# Classification head: linear projection to num_classes.
head:
  _target_: signlang.models.heads.classification.ClassificationHead
  d_model: 512
  num_classes: 500
