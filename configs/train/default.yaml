trainer:
  max_epochs: 80
  accelerator: auto
  devices: 1
  precision: bf16-mixed
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 20
  enable_progress_bar: true
  deterministic: false

optimizer:
  _target_: signlang.training.optimizers.build_optimizer
  name: adamw
  lr: 0.0003
  weight_decay: 0.00001
  betas: [0.9, 0.98]

scheduler:
  _target_: signlang.training.schedulers.build_scheduler
  name: cosine
  warmup_ratio: 0.05

early_stopping:
  enabled: true
  monitor: val_accuracy
  mode: max
  patience: 10

checkpoint:
  monitor: val_accuracy
  mode: max
  save_top_k: 3
  filename: sign-{epoch:02d}-{val_accuracy:.4f}
