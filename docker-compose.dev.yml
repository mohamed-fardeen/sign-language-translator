services:
  app:
    build:
      context: .
      dockerfile: docker/serve.Dockerfile
    image: signlang-serve:dev
    container_name: signlang-app-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVE_ENV=local
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./src:/app/src
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs
    depends_on:
      mlflow:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: signlang-mlflow-dev
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlruns.db
        --default-artifact-root /artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./artifacts:/artifacts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/2.0/mlflow/version"]
      interval: 10s
      timeout: 5s
      retries: 6

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: signlang-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/signlang/src
    environment:
      - PYTHONPATH=/home/jovyan/signlang/src
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
