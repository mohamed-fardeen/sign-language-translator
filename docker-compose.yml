services:
  app:
    build:
      context: .
      dockerfile: docker/serve.Dockerfile
    image: signlang-serve:local
    container_name: signlang-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVE_ENV=local
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      mlflow:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: signlang-mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlruns.db
        --default-artifact-root /artifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./artifacts:/artifacts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/2.0/mlflow/version"]
      interval: 10s
      timeout: 5s
      retries: 6
